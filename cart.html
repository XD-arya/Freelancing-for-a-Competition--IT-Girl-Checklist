<script>
    function getCart() {
        return JSON.parse(localStorage.getItem('itGirlCart')) || [];
    }
    
    function saveCart(cart) {
        localStorage.setItem('itGirlCart', JSON.stringify(cart));
        renderCart();
    }
    
    function updateQuantity(id, change) {
        let cart = getCart();
        const itemIndex = cart.findIndex(it => it.id === id);
        if (itemIndex > -1) {
            cart[itemIndex].quantity += change;
            if (cart[itemIndex].quantity <= 0) {
                cart.splice(itemIndex, 1);
            }
            saveCart(cart);
        }
    }
    
    function removeItem(id) {
        let cart = getCart();
        cart = cart.filter(item => item.id !== id);
        saveCart(cart);
    }
    
    function checkout() {
        const cart = getCart();
        if(cart.length === 0) {
            alert("Your collection is currently empty.");
            window.location.href = 'index.html';
            return;
        }
        let total = 0;
        cart.forEach(item => total += (item.price * item.quantity));
        
        const gpayUrl = `upi://pay?pa=jui.soman11@okaxis&pn=Jui%20Soman&aid=uGICAgMCyp8n6cg&am=${total}&cu=INR&tn=IT%20Girl%20Checklist%20Order`;
        
        // On mobile this opens GPay directly; on desktop it may fail gracefully
        window.location.href = gpayUrl;
        
        // Clear cart and redirect back after 3s (gives time for app to open on mobile)
        localStorage.removeItem('itGirlCart');
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 3000);
    }

    function renderCart() {
        const cart = getCart();
        const container = document.getElementById('cart-items-container');
        
        let totalQty = 0;
        let totalPrice = 0;
        
        if (cart.length === 0) {
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20 text-center bg-surface-container-low rounded-xl border border-dashed border-outline-variant/30">
                    <span class="material-symbols-outlined text-outline text-6xl mb-4 opacity-50">shopping_bag</span>
                    <h3 class="font-headline text-3xl font-bold mb-2">Your collection is empty</h3>
                    <p class="text-outline text-sm uppercase tracking-widest mb-8">Start curating your unique look</p>
                    <a href="index.html" class="bg-primary text-black font-bold uppercase tracking-widest px-8 py-4 rounded-lg hover:scale-105 transition-transform text-xs">Explore Boutique</a>
                </div>
            `;
        } else {
            container.innerHTML = cart.map(item => {
                totalQty += item.quantity;
                totalPrice += (item.price * item.quantity);
                
                return `
                <div class="group relative flex flex-col md:flex-row items-center gap-8 p-6 bg-surface-container-low transition-all duration-300 hover:scale-[1.01] hover:bg-surface-container-high rounded-xl">
                    <div class="w-full md:w-32 lg:w-48 h-48 overflow-hidden rounded-lg bg-surface-container-lowest shrink-0">
                        <img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="${item.name}" src="${item.img}"/>
                    </div>
                    <div class="flex-grow flex flex-col justify-between h-full py-2 w-full">
                        <div>
                            <h3 class="font-headline text-2xl lg:text-3xl font-bold mb-1">${item.name}</h3>
                            <p class="text-outline text-[10px] md:text-sm uppercase tracking-widest">${item.category}</p>
                        </div>
                        <div class="flex items-center justify-between w-full mt-6">
                            <div class="flex items-center bg-surface-container-lowest px-2 py-1 md:px-4 md:py-2 rounded-full border border-outline-variant/30">
                                <button onclick="updateQuantity(${item.id}, -1)" class="material-symbols-outlined text-secondary-fixed-dim hover:scale-125 transition-transform" style="font-size: 20px;">remove</button>
                                <span class="px-4 md:px-6 font-bold text-base md:text-lg">${item.quantity}</span>
                                <button onclick="updateQuantity(${item.id}, 1)" class="material-symbols-outlined text-secondary-fixed-dim hover:scale-125 transition-transform" style="font-size: 20px;">add</button>
                            </div>
                            <span class="font-headline text-xl md:text-2xl text-secondary-fixed-dim">₹${item.price}</span>
                        </div>
                    </div>
                    <button onclick="removeItem(${item.id})" class="absolute top-4 right-4 md:top-6 md:right-6 material-symbols-outlined text-outline/50 hover:text-error transition-colors bg-surface-container-lowest/50 backdrop-blur rounded-full p-1" data-icon="close">close</button>
                </div>
                `;
            }).join('');
        }
        
        // Update summary pane
        document.getElementById('cart-subtotal').textContent = '₹' + totalPrice;
        document.getElementById('cart-total').textContent = '₹' + totalPrice;
        document.getElementById('cart-item-count').textContent = totalQty + (totalQty === 1 ? ' Item' : ' Items');
        
        // Update nav badge
        const navCount = document.getElementById('cart-count-nav');
        if(navCount) {
             if (totalQty > 0) {
                 navCount.textContent = totalQty;
                 navCount.style.opacity = '1';
             } else {
                 navCount.style.opacity = '0';
             }
        }
    }

    // Initialize cart on load
    document.addEventListener('DOMContentLoaded', renderCart);
</script>
